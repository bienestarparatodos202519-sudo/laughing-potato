name: Build installers

on:
  push:
    branches:
      - main
      - cursor/google-drive-beneficiarios-e435
  pull_request:
  workflow_dispatch:

jobs:
  windows-exe:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:desktop:win

      - name: Upload EXE installer
        uses: actions/upload-artifact@v4
        with:
          name: Beneficiarios-Drive-Windows-EXE
          path: release/desktop/*.exe
          if-no-files-found: error

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build APK
        run: npm run build:android:apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Beneficiarios-Drive-Android-APK
          path: release/android/Beneficiarios-Drive.apk
          if-no-files-found: error
